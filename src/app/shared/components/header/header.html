<mat-toolbar>
  <a routerLink="/" class="brand">Portfolio</a>
  <span class="spacer"></span>

  <nav class="nav-desktop" aria-label="Navigazione principale">
    @for (link of navLinks; track link.path) {
      <a
        routerLinkActive="active"
        matButton="text"
        [routerLink]="link.path"
        [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
        >{{ 'Nav.' + link.label | translate }}</a
      >
    }
  </nav>

  <button
    type="button"
    matIconButton
    [attr.aria-label]="isDark() ? 'Passa alla modalità chiara' : 'Passa alla modalità scura'"
    (click)="toggleTheme()"
  >
    <mat-icon [fontIcon]="isDark() ? 'light_mode' : 'dark_mode'" />
  </button>

  <button
    type="button"
    matIconButton
    class="btn-hamburger"
    aria-label="Apri menu di navigazione"
    (click)="toggleMobileMenu()"
  >
    <mat-icon>{{ mobileMenuOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<div class="mobile-menu" [class.open]="mobileMenuOpen()">
  @for (link of navLinks; track link.path) {
    <a
      routerLinkActive="active"
      matButton="text"
      [routerLink]="link.path"
      [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
      (click)="closeMobileMenu()"
      >{{ link.label }}</a
    >
  }
</div>
